# config.toml – Portföljindex
# Alla projektspecifika sökvägar samlade här.
# Uppdatera vid byte av maskin eller mappstruktur.

[paths]
# Indata från Fondanalys-projektet.
# Efter Steg 6-cutover: transaktioner_xlsx ligger i lokala dataroten (väg B),
# 02_Indata/, flyttad från OneDrive enligt cutover-checklistan.
transaktioner_xlsx = "/Users/mikael/Fondanalys-Data/02_Indata/transaktioner.xlsx"
# fonder.xlsx läses från den maskinlokala datväxlingen (väg B), inte _Bridge.
fonder_xlsx = "/Users/mikael/Fondanalys-Data/_exchange/fonder.xlsx"

# Lokal BI-output (väg B): bi_prep skriver portfolio_bi_data.xlsx till datarotens
# 03_Utdata/. Ingen OneDrive-kopia (Power BI-spåret nedlagt 260704, [AQ]) – filen
# stannar lokalt och konsumeras av fond-rapporten (tools/fond_rapport/).
bi_data_local_output = "/Users/mikael/Fondanalys-Data/03_Utdata/portfolio_bi_data.xlsx"

# Statisk TER-seedfil för utträdda/otäckta instrument ([AU], 2026-07-19).
# Fyller endast Dim_Instrument-rader med TER_Status=no_data, skriver aldrig
# över ett skrapat Nordnet-värde. Mängden är stängd (nya innehav täcks av
# ordinarie Nordnet-skrapning), så filen behöver aldrig växa i normal drift.
ter_seed_csv = "/Users/mikael/Fondanalys-Data/02_Indata/ter_seed.csv"

# Fond-rapportens utdata (självbärande HTML) i den maskinlokala dataroten.
# Filnamn: fond_rapport_<as-of>.html. Faller tillbaka till repo-reports/ om tomt.
fond_rapport_output_dir = "/Users/mikael/Fondanalys-Data/04_Analyser/Portföljanalyser"

[policy]
# Passiva policyreferenser: tvåbucketsindex (Aktier/Räntor) med årsvis ombalansering –
# reset till strategivikterna 1 januari, fri drift inom året. Bucketproxys pekar på
# Benchmark_ID-rader i transaktioner.xlsx (Benchmarks-tabellen); priserna
# FX-konverteras till SEK i beräkningen. Se src/policy.py.
# Aktier: MSCI ACWI via UCITS-ETF med Europastängning (IUSQ.DE) – synkar dagsdata
# med portföljens svenska fond-NAV:er betydligt bättre än US-noterade ACWI
# (22:00 CET), vilket annars trycker ned beta/R² i regressionen på ren mätbrist.
buckets = { Aktier = "BM_ACWI_UCITS", Rantor = "BM_Short_Corp_Bond" }

[policy.weights]
# Strategivikter (Aktier/Räntor) per portfölj – måste summera till 1.0.
EGEN = { Aktier = 0.90, Rantor = 0.10 }
PA = { Aktier = 0.85, Rantor = 0.15 }
