# config.toml – Portföljindex
# Alla projektspecifika sökvägar samlade här.
# Uppdatera vid byte av maskin eller mappstruktur.

[paths]
# Indata från Fondanalys-projektet.
# Efter Steg 6-cutover: transaktioner_xlsx ligger i lokala dataroten (väg B),
# 02_Indata/, flyttad från OneDrive enligt cutover-checklistan.
transaktioner_xlsx = "/Users/mikael/Fondanalys-Data/02_Indata/transaktioner.xlsx"
# fonder.xlsx läses från den maskinlokala datväxlingen (väg B), inte _Bridge.
fonder_xlsx = "/Users/mikael/Fondanalys-Data/_exchange/fonder.xlsx"

# Lokal BI-output (väg B): bi_prep skriver portfolio_bi_data.xlsx till datarotens
# 03_Utdata/. OneDrive-kopian sköts nattligt av Fondanalys backup-jobb, inte av
# bi_prep:s direktpublicering (se publish_to_bridge nedan).
bi_data_local_output = "/Users/mikael/Fondanalys-Data/03_Utdata/portfolio_bi_data.xlsx"

# Direktpublicering till OneDrive (_publish_bi_data_to_bridge) är opt-in och
# avstängd som standard – nattjobbet ansvarar för OneDrive-kopian. Slå på via
# denna flagga eller bi_prep --publish-bridge när en samma-sessions PBI-refresh behövs.
publish_to_bridge = false

# Bridge-publicering (används bara när publish_to_bridge = true / --publish-bridge).
bi_data_published = "/Users/mikael/Library/CloudStorage/OneDrive-EmsekAB/Emsek - Dokument/Privat/Fondanalys/03_Utdata/portfolio_bi_data.xlsx"
bi_data_archive = "/Users/mikael/Library/CloudStorage/OneDrive-EmsekAB/Emsek - Dokument/Privat/Fondanalys/03_Utdata/_archive/portfolio_bi_data"
